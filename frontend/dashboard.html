<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VitaaMain Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img src="assets/vitaa-logo.svg" alt="VitaaMain Logo" class="logo">
    <h1>Dashboard</h1>

    <div class="customization">
      <h2>Customize Your Dashboard</h2>
      <label>Logo Left Color: <input type="color" id="leftColor" value="#9B59B6"></label>
      <label>Logo Right Color: <input type="color" id="rightColor" value="#6C3483"></label>
    </div>

    <div class="auto-save-status">
      Auto-save is enabled
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
